<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Indoor Plants</title>
    <meta name="description" content="Explore a variety of indoor plants for your home or office.">

    <style>
        /* Base styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f5;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c4c38;
            margin-bottom: 30px;
            border-bottom: 2px solid #2c4c38;
            padding-bottom: 10px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* Plant card container style using HTML5 semantic thinking */
        .plant-card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 25px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        h2 {
            color: #3a5a40;
            margin-top: 0;
        }

        /* Image sizing and styling */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            display: block;
            margin: 15px 0;
        }

        /* Price tag accent */
        .price {
            font-weight: bold;
            color: #2c4c38;
            font-size: 1.2rem;
            margin-bottom: 0;
        }
    </style>
</head>

<body>

    <h1>Indoor Plants</h1>

    <div class="plant-card">
        <h2>Peace Lily</h2>
        <p>The Peace Lily, known for its elegant white flowers, is a popular choice for indoor spaces.</p>
        <img src="https://edube.org/uploads/media/default/0001/04/spathiphyllum-peace-lily.jpg" alt="Peace Lily">
        <p class="price">Price: $15</p>
    </div>

    <div class="plant-card">
        <h2>Zanzibar Gem</h2>
        <p>The Zanzibar Gem, with its glossy green foliage, is a low-maintenance indoor plant perfect for beginners.</p>
        <img src="https://edube.org/uploads/media/default/0001/04/zamioculcas-zanzibar-gem.jpg" alt="Zanzibar Gem">
        <p class="price">Price: $20</p>
    </div>

</body>

</html>
