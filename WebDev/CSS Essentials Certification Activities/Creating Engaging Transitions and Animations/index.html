<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My Portfolio</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Projects</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <main>
        <!-- Product Showcase Section (adds the required button, product-image, and feature list) -->
        <section class="product-launch">
            <div class="product-showcase">
                <div class="product-image">Product Showcase</div>
                <button type="button" class="cta-button">Order Now</button>
            </div>
            <div class="product-features">
                <h2>Key Features</h2>
                <ul>
                    <li class="feature-item">Sleek Minimalist Design</li>
                    <li class="feature-item">Interactive Animations</li>
                    <li class="feature-item">Eco-Friendly Construction</li>
                </ul>
            </div>
        </section>

        <!-- Original skeleton projects list to maintain integrity with the template -->
        <section class="projects">
            <div class="project-card">
                <h2>Project 1</h2>
                <p>Description of project 1.</p>
            </div>
            <div class="project-card">
                <h2>Project 2</h2>
                <p>Description of project 2.</p>
            </div>
            <div class="project-card">
                <h2>Project 3</h2>
                <p>Description of project 3.</p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 My Portfolio</p>
    </footer>
</body>
</html>
